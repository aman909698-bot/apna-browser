<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';">
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>
  <div id="sidebar">
    <div class="sidebar-header">
      <div class="header-icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M9 1L2 5v4c0 5.55 2.98 10.74 7 12 4.02-1.26 7-6.45 7-12V5L9 1z" fill="url(#aiGrad)"/>
          <circle cx="9" cy="8" r="2.5" fill="white" opacity="0.9"/>
          <defs><linearGradient id="aiGrad" x1="2" y1="1" x2="16" y2="17"><stop stop-color="#6c5ce7"/><stop offset="1" stop-color="#0984e3"/></linearGradient></defs>
        </svg>
      </div>
      <h2>AI Study Buddy</h2>
    </div>

    <div class="quick-actions">
      <button id="btn-summarize" class="action-btn">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="2" width="12" height="1.5" rx="0.75" fill="currentColor"/><rect x="1" y="5.5" width="9" height="1.5" rx="0.75" fill="currentColor"/><rect x="1" y="9" width="10.5" height="1.5" rx="0.75" fill="currentColor"/></svg>
        Summarize
      </button>
      <button id="btn-explain" class="action-btn">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.5"/><path d="M5.5 5.5a1.5 1.5 0 112.12 1.38c-.38.22-.62.6-.62 1.02V8.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><circle cx="7" cy="10.5" r="0.6" fill="currentColor"/></svg>
        Explain
      </button>
      <button id="btn-ask-page" class="action-btn">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 2h10v8H5l-3 2V2z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Ask
      </button>
    </div>

    <div class="translate-row">
      <select id="translate-lang">
        <option value="">Translate to...</option>
        <optgroup label="Indian Languages">
          <option value="Hindi">Hindi</option>
          <option value="Tamil">Tamil</option>
          <option value="Telugu">Telugu</option>
          <option value="Bengali">Bengali</option>
          <option value="Marathi">Marathi</option>
          <option value="Gujarati">Gujarati</option>
          <option value="Kannada">Kannada</option>
          <option value="Malayalam">Malayalam</option>
          <option value="Punjabi">Punjabi</option>
          <option value="Odia">Odia</option>
          <option value="Assamese">Assamese</option>
          <option value="Urdu">Urdu</option>
          <option value="Sanskrit">Sanskrit</option>
          <option value="Maithili">Maithili</option>
          <option value="Konkani">Konkani</option>
          <option value="Manipuri">Manipuri</option>
          <option value="Bodo">Bodo</option>
          <option value="Dogri">Dogri</option>
          <option value="Nepali">Nepali</option>
          <option value="Sindhi">Sindhi</option>
          <option value="Kashmiri">Kashmiri</option>
          <option value="Santali">Santali</option>
        </optgroup>
        <optgroup label="World Languages">
          <option value="English">English</option>
          <option value="Spanish">Spanish</option>
          <option value="French">French</option>
          <option value="German">German</option>
          <option value="Chinese">Chinese</option>
          <option value="Japanese">Japanese</option>
          <option value="Korean">Korean</option>
          <option value="Arabic">Arabic</option>
          <option value="Portuguese">Portuguese</option>
          <option value="Russian">Russian</option>
          <option value="Indonesian">Indonesian</option>
          <option value="Thai">Thai</option>
          <option value="Vietnamese">Vietnamese</option>
          <option value="Turkish">Turkish</option>
          <option value="Italian">Italian</option>
        </optgroup>
      </select>
      <button id="btn-translate" class="action-btn translate-btn">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 2h6M4 2v1.5c0 2-1.5 3.5-3 4.5m2-2c1 1.5 3 3 4 3.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M8 12l2-5 2 5m-3.5-1.5h3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Translate
      </button>
    </div>

    <div id="chat-messages"></div>

    <div class="input-area">
      <button id="btn-voice" class="voice-btn" title="Voice input">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="5.5" y="1" width="5" height="8.5" rx="2.5" stroke="currentColor" stroke-width="1.4"/>
          <path d="M3 7.5a5 5 0 0010 0" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="8" y1="12.5" x2="8" y2="15" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </button>
      <input type="text" id="question-input" placeholder="Ask anything about this page..." spellcheck="false" autocomplete="off">
      <button id="btn-send">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 14l12-6L2 2v4.5l7 1.5-7 1.5V14z" fill="currentColor"/></svg>
      </button>
    </div>
  </div>
  <script src="sidebar.js"></script>
</body>
</html>
