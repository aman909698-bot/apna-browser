<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:;">
  <link rel="stylesheet" href="newtab.css">
</head>
<body>
  <div id="homepage">
    <header>
      <h1 class="brand">Apna Browser</h1>
      <p class="tagline">Apni Padhai</p>
    </header>

    <div id="search-box">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
        <circle cx="7.5" cy="7.5" r="5.5" stroke="#6b7089" stroke-width="2"/>
        <path d="M12 12l4 4" stroke="#6b7089" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <input type="text" id="search-input" placeholder="Search the web..." spellcheck="false" autocomplete="off" autofocus>
    </div>

    <section id="subjects">
      <h2 class="section-title">Subjects</h2>
      <div class="card-grid">
        <div class="subject-card" data-url="https://www.khanacademy.org/science/physics">
          <div class="card-icon" style="background: linear-gradient(135deg, #ff6b35, #f7931e);">
            <span>&#9883;</span>
          </div>
          <span class="card-label">Physics</span>
        </div>
        <div class="subject-card" data-url="https://www.khanacademy.org/science/chemistry">
          <div class="card-icon" style="background: linear-gradient(135deg, #00b4d8, #0077b6);">
            <span>&#9874;</span>
          </div>
          <span class="card-label">Chemistry</span>
        </div>
        <div class="subject-card" data-url="https://www.khanacademy.org/math">
          <div class="card-icon" style="background: linear-gradient(135deg, #8338ec, #5e5ce6);">
            <span>&#120587;</span>
          </div>
          <span class="card-label">Math</span>
        </div>
        <div class="subject-card" data-url="https://www.khanacademy.org/science/biology">
          <div class="card-icon" style="background: linear-gradient(135deg, #06d6a0, #2dc653);">
            <span>&#127807;</span>
          </div>
          <span class="card-label">Biology</span>
        </div>
        <div class="subject-card" data-url="https://www.khanacademy.org/humanities">
          <div class="card-icon" style="background: linear-gradient(135deg, #e63946, #d62828);">
            <span>A</span>
          </div>
          <span class="card-label">English</span>
        </div>
        <div class="subject-card" data-url="https://www.geeksforgeeks.org">
          <div class="card-icon" style="background: linear-gradient(135deg, #0A84FF, #3a86ff);">
            <span>&lt;/&gt;</span>
          </div>
          <span class="card-label">Computer Science</span>
        </div>
      </div>
    </section>

    <section id="bookmarks">
      <h2 class="section-title">Quick Links</h2>
      <div class="bookmark-grid">
        <a class="bookmark" data-url="https://www.khanacademy.org">
          <div class="bm-icon">K</div>
          <span>Khan Academy</span>
        </a>
        <a class="bookmark" data-url="https://ncert.nic.in">
          <div class="bm-icon">N</div>
          <span>NCERT</span>
        </a>
        <a class="bookmark" data-url="https://en.wikipedia.org">
          <div class="bm-icon">W</div>
          <span>Wikipedia</span>
        </a>
        <a class="bookmark" data-url="https://www.youtube.com">
          <div class="bm-icon" style="background: rgba(255,0,0,0.15); color: #ff4444;">Y</div>
          <span>YouTube</span>
        </a>
        <a class="bookmark" data-url="https://www.wolframalpha.com">
          <div class="bm-icon" style="background: rgba(255,130,0,0.15); color: #ff8200;">W</div>
          <span>Wolfram Alpha</span>
        </a>
        <a class="bookmark" data-url="https://www.geeksforgeeks.org">
          <div class="bm-icon" style="background: rgba(0,180,0,0.15); color: #2d8f2d;">G</div>
          <span>GeeksForGeeks</span>
        </a>
        <a class="bookmark" data-url="https://stackoverflow.com">
          <div class="bm-icon" style="background: rgba(244,128,36,0.15); color: #f48024;">S</div>
          <span>StackOverflow</span>
        </a>
        <a class="bookmark" data-url="https://www.coursera.org">
          <div class="bm-icon" style="background: rgba(0,86,210,0.15); color: #0056d2;">C</div>
          <span>Coursera</span>
        </a>
      </div>
    </section>

    <section id="pomodoro">
      <div class="pomodoro-card">
        <h3>Pomodoro Timer</h3>
        <div id="timer-display">25:00</div>
        <div class="timer-controls">
          <button class="timer-preset" data-minutes="25">25 min</button>
          <button class="timer-preset" data-minutes="50">50 min</button>
        </div>
        <div class="timer-actions">
          <button id="timer-start">Start</button>
          <button id="timer-pause" disabled>Pause</button>
          <button id="timer-reset">Reset</button>
        </div>
        <p id="timer-status"></p>
      </div>
    </section>
  </div>
  <script src="newtab.js"></script>
</body>
</html>
