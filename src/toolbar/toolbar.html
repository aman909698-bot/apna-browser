<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';">
  <link rel="stylesheet" href="toolbar.css">
</head>
<body>
  <div id="tab-strip">
    <div id="tabs-container"></div>
    <button id="new-tab-btn" title="New Tab (Ctrl+T)">+</button>
  </div>
  <div id="nav-bar">
    <button id="btn-back" class="nav-btn" title="Back">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button id="btn-forward" class="nav-btn" title="Forward">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 3l5 5-5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button id="btn-reload" class="nav-btn" title="Reload">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M13.5 8a5.5 5.5 0 11-1.6-3.9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M14 2v4h-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <input type="text" id="url-bar" placeholder="Search or enter URL" spellcheck="false" autocomplete="off">
    <button id="btn-focus" class="nav-btn" title="Focus Mode">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.8"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
    </button>
    <button id="btn-sidebar" class="nav-btn" title="AI Sidebar (Ctrl+B)">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1.5" y="2" width="13" height="12" rx="2" stroke="currentColor" stroke-width="1.6"/><line x1="10" y1="2" x2="10" y2="14" stroke="currentColor" stroke-width="1.6"/></svg>
    </button>
    <button id="btn-screenshot" class="nav-btn" title="Screenshot (Ctrl+Shift+S)">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="3" width="12" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/><circle cx="8" cy="8.5" r="2.5" stroke="currentColor" stroke-width="1.4"/><circle cx="4.5" cy="5.5" r="0.8" fill="currentColor"/></svg>
    </button>
    <button id="btn-reports" class="nav-btn" title="Study Reports">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="9" width="3" height="5" rx="0.5" fill="currentColor"/><rect x="6.5" y="5" width="3" height="9" rx="0.5" fill="currentColor"/><rect x="11" y="2" width="3" height="12" rx="0.5" fill="currentColor"/></svg>
    </button>
  </div>
  <script src="toolbar.js"></script>
</body>
</html>
